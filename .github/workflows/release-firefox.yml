name: Release Firefox extension

# On push to main that touches firefox/**, patch-bump the extension version,
# package an unsigned zip, cut a GitHub Release, and (if AMO credentials are
# configured) sign + submit the new version to addons.mozilla.org via web-ext.
# The bot's own bump commit is tagged "[skip ci]" so it never re-triggers.

on:
  push:
    branches: [main]
    paths:
      - 'firefox/**'
      - '.github/workflows/release-firefox.yml'
      - 'amo-metadata.json'
  workflow_dispatch:

concurrency:
  group: release-firefox
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect AMO credentials
        id: amo
        run: echo "ok=${{ secrets.AMO_JWT_ISSUER != '' && secrets.AMO_JWT_SECRET != '' }}" >> "$GITHUB_OUTPUT"

      - name: Bump patch version (manifest + config + popup badge)
        id: version
        run: |
          cd firefox
          current=$(grep -Po '(?<="version": ")[^"]+' manifest.json)
          IFS='.' read -r major minor patch <<< "$current"
          new="$major.$minor.$((patch + 1))"
          tmp=$(mktemp); jq --arg v "$new" '.version = $v' manifest.json > "$tmp" && mv "$tmp" manifest.json
          sed -i "s/version: '$current'/version: '$new'/" config.js || true
          sed -i "s|<span class=\"version-badge\">v[0-9.]*</span>|<span class=\"version-badge\">v$new</span>|" popup/popup.html || true
          echo "VERSION=$new" >> "$GITHUB_OUTPUT"
          echo "Bumped firefox extension $current -> $new"

      - name: Lint extension (web-ext)
        run: npx --yes web-ext@latest lint --source-dir firefox || true

      - name: Package unsigned zip
        run: |
          (cd firefox && zip -r -X ../better-gemini-firefox.zip . -x '*.gitkeep' '*.DS_Store' >/dev/null)
          ls -la better-gemini-firefox.zip

      - name: Commit version bump + tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firefox/manifest.json firefox/config.js firefox/popup/popup.html
          git commit -m "firefox v${{ steps.version.outputs.VERSION }} [skip ci]" || echo "nothing to commit"
          # Push to main with rebase + retry so a concurrent push from the Chrome
          # build pipeline (both run on the same push) can't make this fail before
          # the AMO submit step below.
          pushed=
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              pushed=1; break
            fi
            echo "main push attempt $i rejected (concurrent push?); retrying shortly..."
            sleep $((RANDOM % 5 + 3))
          done
          if [ -z "$pushed" ]; then
            echo "::error::failed to push firefox version bump to main after 5 attempts"
            exit 1
          fi
          # Tag the commit now on main (force-safe for manual re-runs).
          git tag -f "firefox-v${{ steps.version.outputs.VERSION }}"
          git push origin -f "refs/tags/firefox-v${{ steps.version.outputs.VERSION }}"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firefox-v${{ steps.version.outputs.VERSION }}
          name: Firefox v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: better-gemini-firefox.zip

      - name: Sign & submit to AMO (listed channel)
        if: steps.amo.outputs.ok == 'true'
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npx --yes web-ext@latest sign \
            --source-dir firefox \
            --channel listed \
            --amo-metadata amo-metadata.json \
            --approval-timeout 0 \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET"

      - name: AMO not configured (note)
        if: steps.amo.outputs.ok != 'true'
        run: echo "::notice::AMO_JWT_ISSUER / AMO_JWT_SECRET not set — skipped AMO signing. Add them as repo secrets to enable auto-publish."
