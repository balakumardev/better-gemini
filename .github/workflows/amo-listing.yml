name: Update AMO listing

# On-demand: push a tag like "amo-listing-v1" (or run manually) to update the
# Better Gemini AMO listing's description, icon, and screenshots via the AMO v5
# API, using the AMO_JWT_ISSUER / AMO_JWT_SECRET account-level secrets.
# Idempotent (existing screenshots are replaced). Does NOT sign a new version
# or trigger the release workflow.

on:
  push:
    tags:
      - 'amo-listing-v*'
  workflow_dispatch:

permissions: {}

jobs:
  update-listing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet requests
      - name: Update description, icon, screenshots on AMO
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          AMO_ADDON: better-gemini@balakumardev.github
        run: python3 store/amo_listing.py
